<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f0f2f5;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #eef1f1fe;
            padding: 10px 20px;
        }

        .header img { height: 50px; }

        .header h2 {
            margin: 0;
            color: #093dfb;
        }

        .logout {
            color: red;
            font-weight: bold;
            text-decoration: none;
        }

        .container { padding: 20px; }

        .table-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 1200px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .info { font-weight: bold; }

        .actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        select {
            padding: 6px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            height: 38px;
            padding: 0 15px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        .download-btn { background: green; color: white; text-decoration: none; }
        .reset-btn { background: orange; color: white; }
        .delete-btn { background: red; color: white; }

        form { margin: 0; display: flex; gap: 5px; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #007bff;
            color: white;
            padding: 10px;
        }

        td {
            padding: 8px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

    </style>
</head>

<body>

<div class="header">
    <img src="{{ url_for('static', filename='logo.png') }}">
    <h2>Admin Panel</h2>
    <a href="/logout" class="logout">Logout</a>
</div>

<div class="container">
<div class="table-box">

<div class="top-bar">

    <div class="info">
        Total Users: {{ total }} |
        Active Users: {{ active }}
    </div>

    <div class="actions">

        <!-- DELETE DROPDOWN -->
        <form method="POST" action="/delete_logs_user">
            <select name="username" required>
                <option value="">Select User</option>
                {% for u in users %}
                    {% if u != 'admin' %}
                        <option value="{{ u }}">{{ u }}</option>
                    {% endif %}
                {% endfor %}
            </select>

            <button class="btn delete-btn"
                onclick="return confirm('Delete login/logout records for this user?')">
                <i class="fa fa-trash"></i>
            </button>
        </form>

        <!-- DOWNLOAD LOGS -->
        <a href="/download_logs" class="btn download-btn">
            <i class="fa fa-download"></i> Logs
        </a>

        <!-- RESET -->
        <form method="POST" action="/reset_form_no">
            <button class="btn reset-btn">
                <i class="fa fa-refresh"></i> Reset
            </button>
        </form>

    </div>

</div>

<table>
<tr>
    <th>User</th>
    <th>Login Time</th>
    <th>Logout Time</th>
    <th>Form No</th>
    <th>Download</th>
</tr>

{% for row in data %}
<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>

    <td>
        <a href="/download/{{ row[0] }}" class="btn download-btn">
            <i class="fa fa-file-excel"></i>
        </a>
    </td>
</tr>
{% endfor %}

</table>

</div>
</div>

</body>
</html>
