<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
            background: #f0f2f5;
        }

        /* BOX */
        .login-box {
            width: 320px;
            padding: 30px;
            background: white;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        /* LOGO */
        .login-box img {
            width: 300px;
            margin-bottom: 10px;
        }

        h2 {
            margin-bottom: 10px;
        }

        /* MESSAGE */
        .msg {
            margin: 10px 0;
            font-weight: bold;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .back {
            display: block;
            margin-top: 10px;
            text-decoration: none;
            color: #333;
        }

    </style>
</head>

<body>

<div class="login-box">

    <!-- LOGO -->
    <img src="{{ url_for('static', filename='logo.png') }}">

    <h2>Change Password</h2>

    <!-- MESSAGE -->
    {% if msg %}
        <div class="msg {{ 'success' if 'Successfully' in msg else 'error' }}">
            {{ msg }}
        </div>
    {% endif %}

    <!-- FORM -->
    <form method="POST">
        <input type="password" name="old" placeholder="Old Password" required>
        <input type="password" name="new" placeholder="New Password" required>
        <button type="submit">Update Password</button>
    </form>

    <!-- BACK BUTTON -->
    <a href="{{ '/admin' if session['user']=='admin' else '/dashboard' }}" class="back">
        ⬅ Back
    </a>

</div>

</body>
</html>
